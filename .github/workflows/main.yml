name: Notify Bing IndexNow on Push

on:
  push:
    branches:
      - main

jobs:
  indexnow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build URL list and submit to Bing
        run: |
          # 扫描仓库里所有 .html 文件，拼成完整 URL
          URLS=$(find . -name "*.html" -not -path "./.git/*" | sed 's|^\./||' | sed 's|^|"https://harmony.panming.ccwu.cc/|' | sed 's|$|"|' | paste -sd "," -)

          # 如果没有任何 HTML 文件，就退出
          if [ -z "$URLS" ]; then
            echo "没有找到 HTML 文件，跳过"
            exit 0
          fi

          echo "准备提交以下 URL："
          echo "$URLS"

          # 提交到 Bing IndexNow
          curl -X POST "https://www.bing.com/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{
              \"host\": \"harmony.panming.ccwu.cc\",
              \"key\": \"6cb2f11566cd472f933ed308c763b1fb\",
              \"keyLocation\": \"https://harmony.panming.ccwu.cc/6cb2f11566cd472f933ed308c763b1fb.txt\",
              \"urlList\": [$URLS]
            }"
