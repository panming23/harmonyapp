name: IndexNow — 自动提交 URL 到搜索引擎

on:
  push:
    branches:
      - master

jobs:
  indexnow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 步骤1 — 验证 Key 文件
        run: |
          KEY="4422be83dbb842808701629033895d26"
          KEY_FILE="4422be83dbb842808701629033895d26.txt"

          if [ ! -f "$KEY_FILE" ]; then
            echo "❌ Key 文件不存在"
            exit 1
          fi

          ACTUAL=$(sed '1s/^\xEF\xBB\xBF//' "$KEY_FILE" | tr -d '\n\r' | xargs)
          if [ "$ACTUAL" != "$KEY" ]; then
            echo "❌ Key 文件内容不正确"
            exit 1
          fi

          echo "✅ Key 文件验证通过: https://chengguo.panming.ccwu.cc/$KEY_FILE"

      - name: 步骤2 — GET 逐个提交（含延时防限流）
        run: |
          HOST="chengguo.panming.ccwu.cc"
          KEY="4422be83dbb842808701629033895d26"
          KEY_LOCATION="https://${HOST}/${KEY}.txt"
          ENDPOINTS="https://www.bing.com/indexnow https://api.indexnow.org/indexnow"

          URLS=$(node -e "
          const fs = require('fs');
          const path = require('path');

          const host = '${HOST}';
          const urls = [];

          function walk(dir) {
            const entries = fs.readdirSync(dir, { withFileTypes: true });
            for (const e of entries) {
              if (e.name.startsWith('.') || e.name === 'node_modules') continue;
              const full = path.join(dir, e.name);
              if (e.isDirectory()) {
                walk(full);
              } else if (e.name.endsWith('.html') && !e.name.startsWith('google')) {
                const rel = path.relative('.', full);
                urls.push('https://' + host + '/' + encodeURIComponent(rel));
              }
            }
          }
          walk('.');
          urls.sort();
          for (const u of urls) console.log(u);
          ")

          if [ -z "$URLS" ]; then
            echo "❌ 没有找到 HTML 文件"
            exit 1
          fi

          echo "=== 找到以下页面 ==="
          echo "$URLS"
          echo ""

          echo "=== GET 方式提交（每条间隔 2 秒，防止限流） ==="
          FAIL_COUNT=0
          SUCCESS_COUNT=0

          while IFS= read -r URL; do
            [ -z "$URL" ] && continue

            ENCODED_URL=$(node -e "console.log(encodeURIComponent('${URL}'))")
            ENCODED_KL=$(node -e "console.log(encodeURIComponent('${KEY_LOCATION}'))")

            for ENDPOINT in $ENDPOINTS; do
              GET_URL="${ENDPOINT}?url=${ENCODED_URL}&key=${KEY}&keyLocation=${ENCODED_KL}"

              RESPONSE=$(curl -w "\n%{http_code}" -s "$GET_URL")
              HTTP_CODE=$(echo "$RESPONSE" | tail -1)

              if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "202" ]; then
                echo "  ✅ [$HTTP_CODE] $URL → $ENDPOINT"
                SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
              else
                echo "  ❌ [$HTTP_CODE] $URL → $ENDPOINT"
                FAIL_COUNT=$((FAIL_COUNT + 1))
              fi
            done

            sleep 2
          done <<< "$URLS"

          TOTAL=$((SUCCESS_COUNT + FAIL_COUNT))
          echo ""
          echo "=== GET 完成: 成功 $SUCCESS_COUNT / 总计 $TOTAL ==="

      - name: 步骤3 — POST 批量提交到 Bing
        run: |
          HOST="chengguo.panming.ccwu.cc"
          KEY="4422be83dbb842808701629033895d26"
          KEY_LOCATION="https://${HOST}/${KEY}.txt"

          JSON=$(node -e "
          const fs = require('fs');
          const path = require('path');

          const host = '${HOST}';
          const key = '${KEY}';
          const keyLocation = '${KEY_LOCATION}';
          const urls = [];

          function walk(dir) {
            const entries = fs.readdirSync(dir, { withFileTypes: true });
            for (const e of entries) {
              if (e.name.startsWith('.') || e.name === 'node_modules') continue;
              const full = path.join(dir, e.name);
              if (e.isDirectory()) {
                walk(full);
              } else if (e.name.endsWith('.html') && !e.name.startsWith('google')) {
                const rel = path.relative('.', full);
                urls.push('https://' + host + '/' + encodeURIComponent(rel));
              }
            }
          }
          walk('.');
          urls.sort();

          const data = { host, key, keyLocation, urlList: urls };
          console.log(JSON.stringify(data));
          ")

          if [ -z "$JSON" ]; then
            echo "❌ 没有找到 HTML 文件"
            exit 1
          fi

          echo "=== 提交到 Bing ==="
          echo "$JSON" | node -e "console.log(JSON.stringify(JSON.parse(require('fs').readFileSync(0,'utf8')).urlList, null, 2))"
          echo ""

          RESPONSE=$(curl -w "\n%{http_code}" -s -X POST "https://www.bing.com/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$JSON")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "状态码: $HTTP_CODE"
          echo "返回: $BODY"

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "202" ]; then
            echo "✅ Bing POST 批量提交成功！"
          else
            echo "⚠️ Bing POST 提交失败"
          fi

      - name: 步骤4 — POST 批量提交到 IndexNow 通用端点
        run: |
          HOST="chengguo.panming.ccwu.cc"
          KEY="4422be83dbb842808701629033895d26"
          KEY_LOCATION="https://${HOST}/${KEY}.txt"

          JSON=$(node -e "
          const fs = require('fs');
          const path = require('path');

          const host = '${HOST}';
          const key = '${KEY}';
          const keyLocation = '${KEY_LOCATION}';
          const urls = [];

          function walk(dir) {
            const entries = fs.readdirSync(dir, { withFileTypes: true });
            for (const e of entries) {
              if (e.name.startsWith('.') || e.name === 'node_modules') continue;
              const full = path.join(dir, e.name);
              if (e.isDirectory()) {
                walk(full);
              } else if (e.name.endsWith('.html') && !e.name.startsWith('google')) {
                const rel = path.relative('.', full);
                urls.push('https://' + host + '/' + encodeURIComponent(rel));
              }
            }
          }
          walk('.');
          urls.sort();

          const data = { host, key, keyLocation, urlList: urls };
          console.log(JSON.stringify(data));
          ")

          echo "=== 提交到 api.indexnow.org ==="
          RESPONSE=$(curl -w "\n%{http_code}" -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$JSON")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "状态码: $HTTP_CODE"
          echo "返回: $BODY"

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "202" ]; then
            echo "✅ IndexNow POST 批量提交成功！"
          else
            echo "⚠️ IndexNow POST 提交失败"
          fi
