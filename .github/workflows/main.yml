name: IndexNow — 自动提交 URL 到搜索引擎

on:
  push:
    branches:
      - master

jobs:
  indexnow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 步骤1 — 生成 API Key（已预置，无需重复生成）
        run: |
          KEY="b0a05f4bb70f4757885b6d46fd40468d"
          echo "✅ IndexNow API Key 已生成: $KEY"

      - name: 步骤2 — 托管 Key 文件到网站根目录（Option 1）
        run: |
          KEY_FILE="b0a05f4bb70f4757885b6d46fd40468d.txt"
          KEY="b0a05f4bb70f4757885b6d46fd40468d"

          echo "=== 托管地址: https://chengguo.panming.ccwu.cc/$KEY_FILE ==="

          if [ ! -f "$KEY_FILE" ]; then
            echo "❌ Key 文件不存在"
            exit 1
          fi

          ACTUAL=$(sed '1s/^\xEF\xBB\xBF//' "$KEY_FILE" | tr -d '\n\r' | xargs)
          if [ "$ACTUAL" != "$KEY" ]; then
            echo "❌ Key 文件内容不正确"
            exit 1
          fi

          echo "✅ Key 文件验证通过"

      - name: 步骤2补充 — GET 方式提交（jq 编码中文 URL）
        run: |
          HOST="chengguo.panming.ccwu.cc"
          KEY="b0a05f4bb70f4757885b6d46fd40468d"
          KEY_LOCATION="https://${HOST}/${KEY}.txt"
          ENDPOINTS="https://www.bing.com/indexnow https://api.indexnow.org/indexnow"

          # 用 jq 构建 URL 列表并编码
          URLS=$(find . -name "*.html" -not -path "./.git/*" -not -path "./node_modules/*" \
            | sed 's|^\./||' \
            | jq -Rr --arg host "$HOST" '"\($host)/\(.)" | @uri')

          if [ -z "$URLS" ]; then
            echo "❌ 没有找到 HTML 文件"
            exit 1
          fi

          echo "=== GET 方式提交 ==="
          FAIL_COUNT=0
          SUCCESS_COUNT=0

          while IFS= read -r ENCODED_URL; do
            [ -z "$ENCODED_URL" ] && continue

            DECODED_URL=$(printf '%b' "${ENCODED_URL//%/\\x}")
            echo "→ $DECODED_URL"

            for ENDPOINT in $ENDPOINTS; do
              GET_URL="${ENDPOINT}?url=${ENCODED_URL}&key=${KEY}&keyLocation=$(jq -rn --arg kl "$KEY_LOCATION" '$kl | @uri')"

              RESPONSE=$(curl -w "\n%{http_code}" -s "$GET_URL")
              HTTP_CODE=$(echo "$RESPONSE" | tail -1)

              if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "202" ]; then
                echo "  ✅ $ENDPOINT"
                SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
              else
                echo "  ❌ $ENDPOINT (HTTP $HTTP_CODE)"
                FAIL_COUNT=$((FAIL_COUNT + 1))
              fi
            done
          done <<< "$URLS"

          TOTAL=$((SUCCESS_COUNT + FAIL_COUNT))
          echo ""
          echo "=== GET 完成: 成功 $SUCCESS_COUNT / 总计 $TOTAL ==="

      - name: 步骤3 — POST 提交到 Bing（jq 构建 JSON）
        run: |
          HOST="chengguo.panming.ccwu.cc"
          KEY="b0a05f4bb70f4757885b6d46fd40468d"
          KEY_LOCATION="https://${HOST}/${KEY}.txt"

          # 用 jq 构建 JSON，自动处理中文文件名和转义
          JSON=$(find . -name "*.html" -not -path "./.git/*" -not -path "./node_modules/*" \
            | sed 's|^\./||' \
            | jq -R --arg host "$HOST" '"\($host)/\(.)"' \
            | jq -s --arg host "$HOST" --arg key "$KEY" --arg kl "$KEY_LOCATION" \
              '{host: $host, key: $key, keyLocation: $kl, urlList: .}')

          if [ -z "$JSON" ]; then
            echo "❌ 没有找到 HTML 文件"
            exit 1
          fi

          echo "=== 提交到 Bing ==="
          echo "$JSON" | jq .urlList
          echo ""

          RESPONSE=$(curl -w "\n%{http_code}" -s -X POST "https://www.bing.com/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$JSON")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "状态码: $HTTP_CODE"
          echo "返回: $BODY"

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "202" ]; then
            echo "✅ Bing 提交成功！"
          else
            echo "⚠️ Bing 提交失败，待 Key 关联后生效"
          fi

      - name: 步骤3（扩展）— POST 提交到 IndexNow 通用端点
        run: |
          HOST="chengguo.panming.ccwu.cc"
          KEY="b0a05f4bb70f4757885b6d46fd40468d"
          KEY_LOCATION="https://${HOST}/${KEY}.txt"

          JSON=$(find . -name "*.html" -not -path "./.git/*" -not -path "./node_modules/*" \
            | sed 's|^\./||' \
            | jq -R --arg host "$HOST" '"\($host)/\(.)"' \
            | jq -s --arg host "$HOST" --arg key "$KEY" --arg kl "$KEY_LOCATION" \
              '{host: $host, key: $key, keyLocation: $kl, urlList: .}')

          echo "=== 提交到 api.indexnow.org ==="
          RESPONSE=$(curl -w "\n%{http_code}" -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$JSON")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "状态码: $HTTP_CODE"
          echo "返回: $BODY"

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "202" ]; then
            echo "✅ IndexNow 提交成功！"
          else
            echo "⚠️ IndexNow 提交失败，不影响 CI 流程"
          fi
